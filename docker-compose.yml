version: '3.8'
services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: darwin_broker
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:19092
    ports:
      - "19092:19092"

  influxdb:
    image: influxdb:2.7
    container_name: darwin_db
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=harsha
      - DOCKER_INFLUXDB_INIT_PASSWORD=password12345
      - DOCKER_INFLUXDB_INIT_ORG=darwin_intel
      - DOCKER_INFLUXDB_INIT_BUCKET=syscalls
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-super-secret-admin-token

  grafana:
    image: grafana/grafana:latest
    container_name: darwin_grafana
    ports:
      - "3000:3000"
    depends_on:
      - influxdb
